kind = "web"
previewPath = "/"
title = "PR & PO Approval System"
version = "1.0.0"
id = "artifacts/pr-po-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24061
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/pr-po-system run dev"

[services.env]
PORT = "24061"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pr-po-system", "run", "build"]
publicDir = "artifacts/pr-po-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
