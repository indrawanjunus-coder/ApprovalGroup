openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: PR/PO Approval System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: companies
  - name: purchase-requests
  - name: approvals
  - name: purchase-orders
  - name: notifications
  - name: audit-logs
  - name: settings
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUserById
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/companies:
    get:
      operationId: getUserCompanies
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCompanyAssignment"

    put:
      operationId: updateUserCompanies
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserCompaniesRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCompanyAssignment"

  /companies:
    get:
      operationId: getCompanies
      tags: [companies]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"

    post:
      operationId: createCompany
      tags: [companies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    put:
      operationId: updateCompany
      tags: [companies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

    delete:
      operationId: deleteCompany
      tags: [companies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /purchase-requests:
    get:
      operationId: getPurchaseRequests
      tags: [purchase-requests]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseRequestListResponse"

    post:
      operationId: createPurchaseRequest
      tags: [purchase-requests]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseRequestRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseRequest"

  /purchase-requests/{id}:
    get:
      operationId: getPurchaseRequestById
      tags: [purchase-requests]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updatePurchaseRequest
      tags: [purchase-requests]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePurchaseRequestRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseRequest"

  /purchase-requests/{id}/submit:
    post:
      operationId: submitPurchaseRequest
      tags: [purchase-requests]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseRequest"

  /purchase-requests/{id}/receive:
    post:
      operationId: receivePurchaseRequest
      tags: [purchase-requests]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceivePRRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseRequest"

  /approvals:
    get:
      operationId: getApprovals
      tags: [approvals]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"

  /approvals/{id}/approve:
    post:
      operationId: approvePR
      tags: [approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalActionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /approvals/{id}/reject:
    post:
      operationId: rejectPR
      tags: [approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalActionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /approval-rules:
    get:
      operationId: getApprovalRules
      tags: [approvals]
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [purchase, repair, leave]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalRule"

    post:
      operationId: createApprovalRule
      tags: [approvals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalRuleRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRule"

  /approval-rules/{id}:
    put:
      operationId: updateApprovalRule
      tags: [approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalRuleRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRule"

    delete:
      operationId: deleteApprovalRule
      tags: [approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /purchase-orders:
    get:
      operationId: getPurchaseOrders
      tags: [purchase-orders]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrderListResponse"

    post:
      operationId: createPurchaseOrder
      tags: [purchase-orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseOrderRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /purchase-orders/{id}:
    get:
      operationId: getPurchaseOrderById
      tags: [purchase-orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

    put:
      operationId: updatePurchaseOrder
      tags: [purchase-orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePurchaseOrderRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /purchase-orders/{id}/issue:
    post:
      operationId: issuePurchaseOrder
      tags: [purchase-orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /purchase-orders/{id}/receive:
    post:
      operationId: receivePurchaseOrder
      tags: [purchase-orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      parameters:
        - name: unread
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/{id}/read:
    put:
      operationId: markNotificationRead
      tags: [notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    put:
      operationId: markAllNotificationsRead
      tags: [notifications]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /audit-logs:
    get:
      operationId: getAuditLogs
      tags: [audit-logs]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: prId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

    put:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user]

    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        address:
          type: string
          nullable: true
        isActive:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, code, isActive, createdAt]

    CreateCompanyRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        address:
          type: string
          nullable: true
      required: [name, code]

    UserCompanyAssignment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        companyId:
          type: string
        companyName:
          type: string
        department:
          type: string
      required: [id, userId, companyId, companyName, department]

    UpdateUserCompaniesRequest:
      type: object
      properties:
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/UserCompanyInput"
      required: [assignments]

    UserCompanyInput:
      type: object
      properties:
        companyId:
          type: integer
        department:
          type: string
      required: [companyId, department]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: string
          nullable: true
        department:
          type: string
        position:
          type: string
        role:
          type: string
          enum: [admin, user, approver, purchasing]
        superiorId:
          type: integer
          nullable: true
        superiorName:
          type: string
          nullable: true
        isActive:
          type: boolean
        companies:
          type: array
          items:
            $ref: "#/components/schemas/UserCompanyAssignment"
        createdAt:
          type: string
          format: date-time
      required: [id, username, name, department, position, role, isActive, createdAt]

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [users, total, page, limit]

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        name:
          type: string
        email:
          type: string
          nullable: true
        department:
          type: string
        position:
          type: string
        role:
          type: string
          enum: [admin, user, approver, purchasing]
        superiorId:
          type: integer
          nullable: true
        companies:
          type: array
          items:
            $ref: "#/components/schemas/UserCompanyInput"
      required: [username, password, name, department, position, role]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          nullable: true
        department:
          type: string
        position:
          type: string
        role:
          type: string
          enum: [admin, user, approver, purchasing]
        superiorId:
          type: integer
          nullable: true
        isActive:
          type: boolean
        password:
          type: string
        companies:
          type: array
          items:
            $ref: "#/components/schemas/UserCompanyInput"

    PrItem:
      type: object
      properties:
        id:
          type: integer
        prId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        qty:
          type: number
        unit:
          type: string
        estimatedPrice:
          type: number
        totalPrice:
          type: number
      required: [id, prId, name, qty, unit, estimatedPrice, totalPrice]

    PrItemInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        qty:
          type: number
        unit:
          type: string
        estimatedPrice:
          type: number
      required: [name, qty, unit, estimatedPrice]

    PurchaseRequest:
      type: object
      properties:
        id:
          type: integer
        prNumber:
          type: string
        date:
          type: string
          format: date-time
        requesterId:
          type: integer
        requesterName:
          type: string
        department:
          type: string
        companyId:
          type: integer
          nullable: true
        companyName:
          type: string
          nullable: true
        type:
          type: string
          enum: [purchase, repair, leave]
        description:
          type: string
        status:
          type: string
          enum: [draft, waiting_approval, approved, rejected, completed]
        totalAmount:
          type: number
        attachmentUrl:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/PrItem"
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/Approval"
        currentApprovalLevel:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        leaveStartDate:
          type: string
          nullable: true
        leaveEndDate:
          type: string
          nullable: true
        leaveRequesterId:
          type: integer
          nullable: true
        leaveRequesterName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, prNumber, date, requesterId, requesterName, department, type, description, status, totalAmount, items, approvals, createdAt, updatedAt]

    PurchaseRequestListResponse:
      type: object
      properties:
        purchaseRequests:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseRequest"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [purchaseRequests, total, page, limit]

    CreatePurchaseRequestRequest:
      type: object
      properties:
        type:
          type: string
          enum: [purchase, repair, leave]
        description:
          type: string
        companyId:
          type: integer
          nullable: true
        department:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/PrItemInput"
        notes:
          type: string
          nullable: true
        leaveStartDate:
          type: string
          nullable: true
        leaveEndDate:
          type: string
          nullable: true
        leaveRequesterId:
          type: integer
          nullable: true
      required: [type, description]

    UpdatePurchaseRequestRequest:
      type: object
      properties:
        type:
          type: string
          enum: [purchase, repair, leave]
        description:
          type: string
        companyId:
          type: integer
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/PrItemInput"
        notes:
          type: string
          nullable: true
        leaveStartDate:
          type: string
          nullable: true
        leaveEndDate:
          type: string
